name: AniList Status Monitor

permissions:
  contents: read
  actions: read

concurrency:
  group: anilist-monitor
  cancel-in-progress: true

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Download previous state
        run: |
          mkdir -p ./state

          # Find the most recent successful run that has our artifact
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts?name=anilist-monitor-state&per_page=5" \
            | jq -r '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .workflow_run.id // ""')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No previous artifact found, first run."
          else
            echo "Found artifact from run: $RUN_ID"
            curl -s -L \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
              | jq -r '.artifacts[] | select(.name == "anilist-monitor-state") | .archive_download_url' \
              | head -1 \
              | xargs -I{} curl -s -L \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  -o ./state/anilist-monitor-state.zip {}
            
            if [ -f ./state/anilist-monitor-state.zip ]; then
              unzip -o ./state/anilist-monitor-state.zip -d ./state/
              rm ./state/anilist-monitor-state.zip
              echo "State loaded: $(cat ./state/anilist_status.json)"
            fi
          fi

      - name: Check AniList
        id: check
        run: |
          STATUS="up"
          STATUS_CODE=""
          ERROR_MSG=""

          RESPONSE=$(curl -s -o /tmp/anilist_body.json -w "%{http_code}" \
            -X POST "https://graphql.anilist.co/" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"query":"{ Media(id:1) { id } }"}')

          STATUS_CODE="$RESPONSE"

          if [ "$STATUS_CODE" != "200" ]; then
            STATUS="down"
            ERROR_MSG=$(jq -r '.errors[0].message // "HTTP '"$STATUS_CODE"'"' /tmp/anilist_body.json 2>/dev/null || echo "HTTP $STATUS_CODE")
          else
            HAS_ERROR=$(jq -r 'if ((.errors // [] | length) > 0) and (.data == null) and (.errors[0].status == 403) then .errors[0].message else "" end' /tmp/anilist_body.json 2>/dev/null)
            if [ -n "$HAS_ERROR" ]; then
              STATUS="down"
              ERROR_MSG="$HAS_ERROR"
            fi
          fi

          ERROR_MSG=$(echo "$ERROR_MSG" | cut -c1-900)

          echo "STATUS=$STATUS" >> $GITHUB_OUTPUT
          echo "STATUS_CODE=$STATUS_CODE" >> $GITHUB_OUTPUT
          echo "ERROR_MSG=$ERROR_MSG" >> $GITHUB_OUTPUT
          echo "Current: $STATUS | Code: $STATUS_CODE | Error: $ERROR_MSG"

      - name: Load Previous State
        id: prev
        run: |
          if [ -f ./state/anilist_status.json ]; then
            PREV_STATUS=$(jq -r '.status' ./state/anilist_status.json)
            DOWN_SINCE=$(jq -r '.down_since // ""' ./state/anilist_status.json)
          else
            PREV_STATUS="unknown"
            DOWN_SINCE=""
          fi
          echo "PREV_STATUS=$PREV_STATUS" >> $GITHUB_OUTPUT
          echo "DOWN_SINCE=$DOWN_SINCE" >> $GITHUB_OUTPUT
          echo "Previous: $PREV_STATUS"

      - name: Notify Down
        if: steps.check.outputs.STATUS == 'down' && steps.prev.outputs.PREV_STATUS != 'down'
        env:
          WEBHOOK_DAN: ${{ secrets.ANILIST_WEBHOOK_DAN }}
          WEBHOOK_DART: ${{ secrets.ANILIST_WEBHOOK_DART }}
          WEBHOOK_ANYMEX: ${{ secrets.ANILIST_WEBHOOK_ANYMEX }}
          ROLE_DAN: ${{ secrets.ANILIST_ROLE_DAN }}
          ROLE_DART: ${{ secrets.ANILIST_ROLE_DART }}
          ROLE_ANYMEX: ${{ secrets.ANILIST_ROLE_ANYMEX }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ERROR_MSG="${{ steps.check.outputs.ERROR_MSG }}"
          STATUS_CODE="${{ steps.check.outputs.STATUS_CODE }}"

          send() {
            local WEBHOOK="$1"
            local ROLE="$2"
            [ -z "$WEBHOOK" ] && return

            PAYLOAD=$(jq -nc \
              --arg role "$ROLE" \
              --arg error "$ERROR_MSG" \
              --arg code "$STATUS_CODE" \
              --arg ts "$TS" \
              '{
                content: (if $role != "" then "<@&\($role)>" else null end),
                embeds: [{
                  title: "🔴 AniList is DOWN",
                  description: "**Error:** \($error)\n**Status Code:** \($code)",
                  color: 16729156,
                  footer: { text: "AniList Monitor" },
                  timestamp: $ts
                }]
              }')

            curl -s -o /dev/null -w "Webhook: %{http_code}\n" \
              -H "Content-Type: application/json" \
              -X POST "$WEBHOOK" \
              -d "$PAYLOAD"
          }

          send "$WEBHOOK_DAN" "$ROLE_DAN"
          send "$WEBHOOK_DART" "$ROLE_DART"
          send "$WEBHOOK_ANYMEX" "$ROLE_ANYMEX"

      - name: Notify Up
        if: steps.check.outputs.STATUS == 'up' && steps.prev.outputs.PREV_STATUS == 'down'
        env:
          WEBHOOK_DAN: ${{ secrets.ANILIST_WEBHOOK_DAN }}
          WEBHOOK_DART: ${{ secrets.ANILIST_WEBHOOK_DART }}
          WEBHOOK_ANYMEX: ${{ secrets.ANILIST_WEBHOOK_ANYMEX }}
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DOWN_SINCE="${{ steps.prev.outputs.DOWN_SINCE }}"
          NOW=$(date +%s)

          if [ -n "$DOWN_SINCE" ] && [ "$DOWN_SINCE" != "null" ]; then
            DURATION_SEC=$((NOW - DOWN_SINCE))
            HRS=$((DURATION_SEC / 3600))
            MINS=$(( (DURATION_SEC % 3600) / 60 ))
            SECS=$((DURATION_SEC % 60))
            if [ "$HRS" -gt 0 ]; then
              DURATION_STR="${HRS}h ${MINS}m ${SECS}s"
            else
              DURATION_STR="${MINS}m ${SECS}s"
            fi
          else
            DURATION_STR="Unknown"
          fi

          send() {
            local WEBHOOK="$1"
            [ -z "$WEBHOOK" ] && return

            PAYLOAD=$(jq -nc \
              --arg duration "$DURATION_STR" \
              --arg ts "$TS" \
              '{
                embeds: [{
                  title: "🟢 AniList is back UP",
                  description: "**Downtime Duration:** \($duration)",
                  color: 4521096,
                  footer: { text: "AniList Monitor" },
                  timestamp: $ts
                }]
              }')

            curl -s -o /dev/null -w "Webhook: %{http_code}\n" \
              -H "Content-Type: application/json" \
              -X POST "$WEBHOOK" \
              -d "$PAYLOAD"
          }

          send "$WEBHOOK_DAN"
          send "$WEBHOOK_DART"
          send "$WEBHOOK_ANYMEX"

      - name: Save State
        run: |
          mkdir -p ./state
          STATUS="${{ steps.check.outputs.STATUS }}"
          PREV_STATUS="${{ steps.prev.outputs.PREV_STATUS }}"
          DOWN_SINCE="${{ steps.prev.outputs.DOWN_SINCE }}"
          NOW=$(date +%s)

          if [ "$STATUS" = "down" ] && [ "$PREV_STATUS" != "down" ]; then
            DOWN_SINCE=$NOW
          elif [ "$STATUS" = "up" ]; then
            DOWN_SINCE=""
          fi

          jq -nc \
            --arg status "$STATUS" \
            --arg down_since "$DOWN_SINCE" \
            '{ status: $status, down_since: (if $down_since != "" then ($down_since | tonumber) else null end) }' \
            > ./state/anilist_status.json

          echo "Saved state: $(cat ./state/anilist_status.json)"

      - name: Upload State Artifact
        uses: actions/upload-artifact@v4
        with:
          name: anilist-monitor-state
          path: ./state/anilist_status.json
          retention-days: 1
          overwrite: true
